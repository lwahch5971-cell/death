<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>السجل الأخير</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- شاشة الاختراق -->

<div id="bootScreen">

<div class="bootText">

<div class="line">جارٍ الوصول إلى الجهاز...</div>

<div class="line hidden">تجاوز التشفير...</div>

<div class="line hidden">تم العثور على سجل محذوف.</div>

</div>

</div>

<!-- زر التشغيل -->

<div id="startScreen" class="hidden">

<h1>السجل الأخير</h1>

<button id="startBtn">

▶ تشغيل السجل الأخير

</button>

</div>

<!-- الفضاء -->

<div id="spaceScene" class="hidden">

<div id="stars"></div>

<div class="overlay"></div>

<div class="content">

<div id="dateText"></div>

<div id="deathText"></div>

</div>

</div>

<!-- تشويش النهاية -->

<div id="endGlitch" class="hidden">

<div class="endLine">

ARCHIVE CLOSED

</div>

<div class="endLine">

CONNECTION LOST

</div>

<div class="endLine">

SIGNAL TERMINATED

</div>

</div>

<audio id="audio">

<source src="oliver-theme.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>

</html>
